# Hardware and units metadata for SpikeSortingMatInterface (ndx-franklab-novela types).
# Loaded by SpikeSortingMatInterface.get_metadata() as the single source of truth.
# arc_ecephys/metadata.yaml may override individual fields via dict_deep_update()
# in convert_session.py if session-specific values differ.
#
# DataAcqDevice: Horizontal Headstage 128-Channel Datalogger (HH128) by SpikeGadgets.
#   Amplifier and ADC circuit are integrated in the same unit (confirmed by lab).
# Probe: 32-tetrode array.
#   contact_size: unknown — using 0.0125 mm (12.5 um), a standard nichrome tetrode
#   wire diameter, as a placeholder. A real numeric value (rather than NaN/None) is
#   required: Spyglass's IngestionMixin._unequal_vals() treats NaN as always-unequal
#   to NULL, so a NaN-derived contact_size triggers an unresolvable "accept divergence"
#   prompt (EOFError in non-interactive runs) on every Probe.Electrode insert after the
#   first. TODO (open_questions.md Q8): confirm actual wire diameter with lab.
Ecephys:
  DataAcqDevice:
    name: HH128
    system: SpikeGadgets
    amplifier: Horizontal Headstage 128-Channel Datalogger  # integrated in HH128 (confirmed by lab)
    adc_circuit: Horizontal Headstage 128-Channel Datalogger  # integrated in HH128 (confirmed by lab)
    description: >
      Horizontal Headstage 128-Channel Datalogger (HH128) by SpikeGadgets.
      Amplifier and ADC circuit are integrated inside the same Datalogger unit.
      Used for tetrode array recordings (Pagan Lab, University of Edinburgh).
    manufacturer: SpikeGadgets

  Units:
    description: >
      Spike-sorted units recorded from a 32-tetrode SpikeGadgets array implanted in
      Long-Evans rats during an auditory task-switching paradigm (BControl).
      Spike sorting was performed offline using the Pagan Lab pipeline.
      Each unit includes spike times, mean waveform, waveform SD, and tetrode ID.

  Probe:
    name: tetrode_array
    probe_type: tetrode
    units: mm
    probe_description: "32-tetrode array (SpikeGadgets, Pagan Lab)"
    contact_size: 0.0125  # 12.5 um, typical nichrome tetrode wire. TODO (open_questions.md Q8): confirm with lab.

  # Tetrode → brain region mapping.
  # Fill in once the lab provides the surgical map (open_questions.md Q2).
  # Keys are tetrode numbers (int); values are brain region strings (str).
  # Any tetrode not listed falls back to tetrode_location_default.
  # If the mapping varies per animal, override tetrode_locations in
  # arc_ecephys/metadata.yaml using the same dict format.
  tetrode_location_default: "unknown"
  tetrode_locations: {}
  # Example (replace {} above with the actual map):
  #   tetrode_locations:
  #     1: "PFC"
  #     2: "PFC"
  #     9: "Striatum"
  #     10: "Striatum"
